<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaseCraft — 3D Printed Vases</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>VaseCraft</h1>
    <p>Choose a vase, customize it, and purchase in minutes.</p>
  </header>

  <main class="layout">
    <aside class="panel">
      <h2>Filter</h2>
      <label>Style
        <select id="styleFilter">
          <option value="all">All</option>
          <option value="minimal">Minimal</option>
          <option value="spiral">Spiral</option>
          <option value="geometric">Geometric</option>
          <option value="organic">Organic</option>
        </select>
      </label>

      <label>Material
        <select id="materialFilter">
          <option value="all">All</option>
          <option value="PLA">PLA</option>
          <option value="PETG">PETG</option>
          <option value="Resin">Resin</option>
        </select>
      </label>

      <label>Max Price ($)
        <input id="priceFilter" type="range" min="20" max="120" value="120" />
      </label>
      <div id="priceValue">120</div>
    </aside>

    <section>
      <h2>Catalog</h2>
      <div id="catalog" class="grid"></div>
    </section>

    <aside class="panel">
      <h2>Cart</h2>
      <ul id="cart"></ul>
      <p><strong>Total:</strong> $<span id="total">0</span></p>

      <h3>Checkout</h3>
      <form id="checkoutForm">
        <input required id="name" placeholder="Name" />
        <input required id="email" type="email" placeholder="Email" />
        <input required id="address" placeholder="Shipping address" />
        <button type="submit">Place Order</button>
      </form>
      <p id="status"></p>

      <h3>Past Orders</h3>
      <ul id="orders"></ul>
    </aside>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <img class="card-img" src="" alt="" loading="lazy" />
      <h3 class="title"></h3>
      <p class="meta"></p>
      <p class="price"></p>

      <label>Color
        <select class="color"></select>
      </label>

      <label>Size
        <select class="size">
          <option value="small">Small</option>
          <option value="medium" selected>Medium</option>
          <option value="large">Large</option>
        </select>
      </label>

      <button class="add">Add to cart</button>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
